<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOBI | Portfolio</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50%25' y='60%25' font-size='60' fill='white' text-anchor='middle' font-family='Arial' font-weight='bold'%3EK%3C/text%3E%3C/svg%3E">

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

img{
    width:100%;
    cursor:pointer;
    border:1px solid #222;
    transition:0.2s;
}

img:hover{
    transform:scale(1.02);
}

/* MODAL */
#modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

#modal img{
    max-width:90%;
    max-height:90%;
    border:none;
}

#close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1 style="text-align:center;padding:20px;">KOBI Portfolio</h1>

<div class="grid">
    <img src="thumb-01.png" alt="">
    <img src="thumb-02.png" alt="">
    <img src="thumb-03.png" alt="">
    <img src="thumb-04.png" alt="">
    <img src="thumb-05.png" alt="">
</div>

<!-- MODAL -->
<div id="modal">
    <span id="close">✕</span>
    <img id="modalImg">
</div>

<script>
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");
const closeBtn = document.getElementById("close");

document.querySelectorAll("img").forEach(img=>{
    img.addEventListener("click", ()=>{
        modal.style.display = "flex";
        modalImg.src = img.src;
    });
});

closeBtn.onclick = () => {
    modal.style.display = "none";
};

modal.onclick = (e) => {
    if(e.target === modal){
        modal.style.display = "none";
    }
};
</script>

</body>
</html>
